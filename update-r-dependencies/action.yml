name: "Update R package dependencies"
description: "Update missing or outdated R package dependencies"
inputs:
  token:
    description: "GitHub token"
    required: false
    default: ${{ github.token }}
  needs:
    description: "Config/Needs tag(s), used to expand additional dependency fields"
    required: false
    default: ""
  extra-packages:
    description: "Extra packages to install, in addition to package dependencies"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # Call pak::pak() directly so it checks .libPaths() and only
    # installs/updates packages that are genuinely missing or outdated.
    # setup-r-dependencies always runs a full lockfile-create → lockfile-install
    # cycle which reinstalls everything even when the container already has it.
    - name: Update R package dependencies (container)
      shell: Rscript {0}
      env:
        GITHUB_PAT: ${{ inputs.token }}
      run: |
        # Replicate needs → Config/Needs/<field> expansion from r-lib/actions
        needs_parts <- strsplit("${{ inputs.needs }}", "[[:space:],]+")[[1]]
        needs_parts <- needs_parts[nzchar(needs_parts)]
        needs <- sprintf("Config/Needs/%s", needs_parts)

        extra_deps <- strsplit("${{ inputs.extra-packages }}", "[[:space:],]+")[[1]]
        extra_deps <- extra_deps[nzchar(extra_deps)]

        # Over-protect for strangeness in the container
        if (!requireNamespace("pak", quietly = TRUE)) {
          install.packages("pak")
        }

        pak::pak(
          c("deps::.", extra_deps),
          dependencies = c(needs, "all"),
          upgrade = TRUE,
          ask = FALSE
        )
